<!-- base.html -->
<!DOCTYPE html>
<html>
<head>
    <title>SmartDoc AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex transition-colors duration-300" id="bodyRoot">
    <aside id="sidebar" class="w-64 bg-gray-800 flex flex-col h-screen shadow-lg">
        <div class="logo text-2xl font-bold px-6 py-6 border-b border-gray-700 text-blue-400 tracking-wide flex items-center justify-between">
            SmartDoc AI
            <button id="themeToggle" class="ml-2 px-2 py-1 rounded bg-gray-700 text-gray-300 hover:bg-gray-600 transition text-sm">
                🌙
            </button>
        </div>
        <nav class="flex-1 flex flex-col gap-1 mt-4">
            <a href="{% url 'chat' %}" class="px-6 py-3 rounded-l-lg transition-colors duration-200 hover:bg-gray-700 hover:text-blue-300 {% if request.resolver_match.url_name == 'chat' %}bg-blue-700 text-white{% endif %}">💬 Chat AI</a>
            <a href="{% url 'file_manager' %}" class="px-6 py-3 rounded-l-lg transition-colors duration-200 hover:bg-gray-700 hover:text-blue-300 {% if request.resolver_match.url_name == 'file_manager' %}bg-blue-700 text-white{% endif %}">📁 Quản lý File</a>
        </nav>
    </aside>
    <main id="content" class="flex-1 p-0 bg-gray-900 min-h-screen flex flex-col">
        <div class="max-w-full w-full h-full flex-1 flex flex-col">
            {% block content %}{% endblock %}
        </div>
    </main>
    <script>
        // Theme toggle logic
        const body = document.getElementById('bodyRoot');
        const btn = document.getElementById('themeToggle');
        function setTheme(dark) {
            if (dark) {
                body.classList.add('bg-gray-900', 'text-gray-100');
                body.classList.remove('bg-white', 'text-gray-900');
                btn.textContent = '🌙';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('bg-gray-900', 'text-gray-100');
                body.classList.add('bg-white', 'text-gray-900');
                btn.textContent = '☀️';
                localStorage.setItem('theme', 'light');
            }
        }
        btn.onclick = () => setTheme(!body.classList.contains('bg-white'));
        // On load
        if (localStorage.getItem('theme') === 'light') setTheme(false);
        else setTheme(true);
    </script>
</body>
</html>
