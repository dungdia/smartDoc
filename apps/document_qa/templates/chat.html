<!-- chat.html -->
{% extends 'base.html' %}
{% block content %}
<div class="flex flex-col h-screen max-h-[calc(100vh-0px)]">
<div id="chatBox" class="flex-1 h-0 bg-gray-800 border border-gray-700 rounded-xl p-4 mb-4 overflow-y-auto shadow-inner"></div>
    <div class="flex items-center gap-2 pb-4 px-2">
        <button id="importBtn" class="px-3 py-2 bg-gray-700 text-gray-300 rounded-lg hover:bg-gray-600 transition flex items-center justify-center" title="Import">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 20V4m0 0l-6 6m6-6l6 6" />
            </svg>
        </button>
        <input id="chatInput" type="text" placeholder="Nhập câu hỏi..." class="flex-1 px-4 py-2 bg-gray-700 text-gray-100 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400" />
        <button id="sendBtn" class="px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center justify-center disabled:opacity-50" disabled title="Gửi">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14m0 0l-6-6m6 6l-6 6" />
            </svg>
        </button>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const chatBox = document.getElementById('chatBox');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const importBtn = document.getElementById('importBtn');

    function escapeHtml(text) {
        return text.replace(/[&<>"']/g, function(m) {
            return ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            })[m];
        });
    }

    function updateSendBtn() {
        sendBtn.disabled = chatInput.value.trim().length === 0;
    }

    function appendUserMessage(msg) {
        chatBox.innerHTML += `<div class="mb-2 text-right"><span class="inline-block bg-blue-900 text-blue-200 px-3 py-1 rounded-lg">Bạn: ${msg}</span></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function appendBotMessage(msg) {
        let html = "";
        if (window.marked) {
            html = marked.parse(msg);
        } else {
            html = escapeHtml(msg).replace(/\n/g, "<br>");
        }
        chatBox.innerHTML += `<div class="mb-2 text-left"><span class="inline-block bg-gray-700 text-gray-200 px-3 py-1 rounded-lg bot-msg">${html}</span></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    function appendLoading() {
        const loadingId = 'bot-loading';
        chatBox.innerHTML += `<div id="${loadingId}" class="mb-2 text-left"><span class="inline-block bg-gray-700 text-gray-200 px-3 py-1 rounded-lg">Bot: <span class="animate-pulse">Đang trả lời...</span></span></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        return loadingId;
    }

    function removeLoading(loadingId) {
        const el = document.getElementById(loadingId);
        if (el) el.remove();
    }

    async function sendMessage() {
        const userMsg = chatInput.value.trim();
        if (!userMsg) return;
        appendUserMessage(userMsg);
        chatInput.value = '';
        updateSendBtn();
        chatInput.disabled = true;
        sendBtn.disabled = true;
        const loadingId = appendLoading();

        try {
            const resp = await fetch("{% url 'chat' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "X-CSRFToken": getCookie('csrftoken')
                },
                body: new URLSearchParams({ message: userMsg })
            });
            const data = await resp.json();
            removeLoading(loadingId);
            if (data.status === 'success') {
                appendBotMessage(data.answer);
            } else {
                appendBotMessage("Có lỗi xảy ra, vui lòng thử lại.");
            }
        } catch (e) {
            removeLoading(loadingId);
            appendBotMessage("Không thể kết nối tới server.");
        }
        chatInput.disabled = false;
        updateSendBtn();
        chatInput.focus();
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    chatInput.addEventListener('input', updateSendBtn);

    chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !sendBtn.disabled) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.onclick = sendMessage;

    updateSendBtn();
</script>
{% endblock %}
