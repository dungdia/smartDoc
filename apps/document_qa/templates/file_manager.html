<!-- file_manager.html -->
{% extends 'base.html' %}
{% block content %}
<h2 class="text-2xl font-semibold mb-6 text-blue-300">Quản lý tài liệu</h2>
<form method="post" enctype="multipart/form-data" class="mb-6 flex items-center gap-4 bg-gray-800 p-4 rounded-xl border border-gray-700">
    {% csrf_token %}
    <input type="file" name="doc_file" class="flex-1 text-gray-100 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Upload File</button>
</form>
<div class="overflow-x-auto">
    <table class="min-w-full bg-gray-800 border border-gray-700 rounded-xl text-gray-100">
        <thead>
            <tr>
                <th class="px-4 py-2 border-b border-gray-700">Tên File</th>
                <th class="px-4 py-2 border-b border-gray-700">Ngày Upload</th>
                <th class="px-4 py-2 border-b border-gray-700">Hành động</th>
            </tr>
        </thead>
        <tbody>
            <!-- File rows here -->
        </tbody>
    </table>
</div>
{% endblock %}
