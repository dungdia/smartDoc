{% extends 'base.html' %}
{% block content %}
<div class="p-6">
    <h2 class="text-2xl font-semibold mb-6 text-blue-600 dark:text-blue-300">Quản lý tài liệu</h2>

    <form id="uploadForm" class="mb-6 flex items-center gap-4 bg-white dark:bg-gray-800 p-4 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm transition-colors">
        {% csrf_token %}
        <input type="file" id="fileInput" name="doc_file" accept=".pdf,.docx" 
               class="flex-1 text-gray-900 dark:text-gray-100 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" />
        
        <button type="button" onclick="uploadFile()" id="uploadBtn"
                class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2 shadow-md disabled:opacity-50">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
            </svg>
            <span id="btnText">Upload & Embed</span>
        </button>
    </form>

    <div id="statusMessage" class="hidden mb-4 p-3 rounded-lg text-sm border transition-all"></div>

    <div class="overflow-x-auto rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm">
        <table class="min-w-full bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 transition-colors">
            <thead>
                <tr class="bg-gray-50 dark:bg-gray-700/50">
                    <th class="px-6 py-3 border-b border-gray-200 dark:border-gray-700 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Tên File</th>
                    <th class="px-6 py-3 border-b border-gray-200 dark:border-gray-700 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Trạng thái</th>
                    <th class="px-6 py-3 border-b border-gray-200 dark:border-gray-700 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Hành động</th>
                </tr>
            </thead>
            <tbody id="fileTableBody" class="divide-y divide-gray-200 dark:divide-gray-700">
                </tbody>
        </table>
    </div>

    <div id="pagination" class="mt-4 flex justify-end items-center gap-2"></div>
</div>

<script>
let currentPage = 1;
const URLS = {
    upload: "{% url 'upload_document' %}",
    getFiles: "{% url 'get_files_api' %}",
    delete: "{% url 'delete_document' '00000000-0000-0000-0000-000000000000' %}"
};

// 1. Hàm load danh sách file
async function loadFileList(page = 1) {
    currentPage = page;
    try {
        const response = await fetch(`${URLS.getFiles}?page=${page}`);
        const data = await response.json();
        const tbody = document.getElementById('fileTableBody');
        tbody.innerHTML = '';

        if (data.files.length === 0) {
            tbody.innerHTML = `<tr><td class="px-6 py-4 whitespace-nowrap text-sm italic text-gray-400 text-center" colspan="3">Chưa có tài liệu nào được tải lên.</td></tr>`;
            return;
        }

        let hasProcessing = false;

        data.files.forEach(file => {
            // Kiểm tra xem có file nào đang xử lý không để kích hoạt polling
            if (file.status === 'Processing' || file.status === 'Pending') hasProcessing = true;
            
            // Màu sắc trạng thái đồng bộ với phong cách hiện đại
            const statusStyle = {
                'Success': 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300',
                'Processing': 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300 animate-pulse',
                'Error': 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300',
                'Pending': 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-400'
            }[file.status] || 'bg-gray-100 text-gray-800';

            tbody.innerHTML += `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">${file.file_name}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold ${statusStyle}">
                            ${file.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <button onclick="deleteFile('${file.id}')" class="text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300 font-medium transition-colors">
                            Xóa
                        </button>
                    </td>
                </tr>
            `;
        });

        renderPagination(data);

        // Tự động reload nếu có file đang embedding (3 giây/lần)
        if (hasProcessing) {
            setTimeout(() => loadFileList(currentPage), 3000);
        }

    } catch (error) {
        console.error("Lỗi khi tải danh sách file:", error);
    }
}

// 2. Vẽ bộ phân trang
function renderPagination(data) {
    const nav = document.getElementById('pagination');
    const btnClass = "px-3 py-1 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 disabled:opacity-30 transition-colors";
    
    nav.innerHTML = `
        <button onclick="loadFileList(${data.number - 1})" ${!data.has_previous ? 'disabled' : ''} class="${btnClass}">Trước</button>
        <span class="text-sm text-gray-500 dark:text-gray-400">Trang ${data.number} / ${data.num_pages}</span>
        <button onclick="loadFileList(${data.number + 1})" ${!data.has_next ? 'disabled' : ''} class="${btnClass}">Sau</button>
    `;
}

// 3. Hàm Upload file (Kết nối API chạy nền)
async function uploadFile() {
    const fileInput = document.getElementById('fileInput');
    const btn = document.getElementById('uploadBtn');
    const btnText = document.getElementById('btnText');
    const status = document.getElementById('statusMessage');
    const file = fileInput.files[0];

    if (!file) {
        alert("Vui lòng chọn file!");
        return;
    }

    btn.disabled = true;
    btnText.innerText = "Đang gửi...";

    const formData = new FormData();
    formData.append('file', file);
    formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

    try {
        const response = await fetch(URLS.upload, {
            method: 'POST',
            body: formData
        });
        const data = await response.json();

        if (data.status === 'success') {
            status.className = "mb-4 p-3 rounded-lg text-sm block border bg-green-50 dark:bg-green-900/30 border-green-200 dark:border-green-800 text-green-700 dark:text-green-300";
            status.innerText = "✅ " + data.message;
            fileInput.value = '';
            // Load lại trang 1 để thấy file mới nhất
            loadFileList(1);
        } else {
            throw new Error(data.message);
        }
    } catch (error) {
        status.className = "mb-4 p-3 rounded-lg text-sm block border bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800 text-red-700 dark:text-red-300";
        status.innerText = "❌ Lỗi: " + error.message;
    } finally {
        btn.disabled = false;
        btnText.innerText = "Upload & Embed";
    }
}

async function deleteFile(fileId) {
    // 1. Xác nhận trước khi xóa
    if (!confirm("Bạn có chắc chắn muốn xóa tài liệu này? Dữ liệu kiến thức liên quan cũng sẽ bị gỡ bỏ.")) {
        return;
    }

    const status = document.getElementById('statusMessage');
    
    // 2. Tạo URL chính xác bằng cách thay thế UUID giả
    const deleteUrl = URLS.delete.replace('00000000-0000-0000-0000-000000000000', fileId);

    try {
        const response = await fetch(deleteUrl, {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}' // Gửi kèm token bảo mật
            }
        });

        const data = await response.json();

        if (data.status === 'success') {
            // Hiển thị thông báo thành công
            status.className = "mb-4 p-3 rounded-lg text-sm block border bg-green-50 dark:bg-green-900/30 border-green-200 dark:border-green-800 text-green-700 dark:text-green-300";
            status.innerText = "✅ " + data.message;
            
            // Reload lại danh sách ở trang hiện tại
            loadFileList(currentPage);
        } else {
            alert("Lỗi: " + data.message);
        }
    } catch (error) {
        console.error("Lỗi khi xóa:", error);
        alert("Không thể kết nối đến máy chủ để xóa file.");
    }
}

// Khởi tạo danh sách khi vừa load trang
document.addEventListener('DOMContentLoaded', () => loadFileList(1));
</script>
{% endblock %}
